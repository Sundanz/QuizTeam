<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Night Team Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #222240;
    --border: rgba(255,255,255,0.08);
    --text: #f0eef8;
    --muted: rgba(240,238,248,0.5);
    --accent: #f0c040;
    --accent2: #e06060;
    --radius: 14px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header .eyebrow {
    font-family: var(--font-body);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(3rem, 8vw, 5.5rem);
    line-height: 1;
    letter-spacing: 2px;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    margin-bottom: 2rem;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn-start {
    width: 100%;
    background: var(--accent);
    color: #1a1400;
    font-family: var(--font-display);
    font-size: 1.6rem;
    letter-spacing: 2px;
    border: none;
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  .btn-start:hover { transform: scale(1.02); }
  .btn-start:active { transform: scale(0.97); }

  .game-area {
    width: 100%;
    max-width: 480px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .game-area.visible { display: flex; }

  .progress-bar-wrap {
    width: 100%;
    background: var(--surface2);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    width: 100%;
  }

  .result-display {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .result-display .waiting {
    font-size: 15px;
    color: var(--muted);
  }

  .result-display .person-num {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .result-display .team-label {
    font-family: var(--font-display);
    font-size: clamp(1rem, 4vw, 1.2rem);
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .result-display .team-number {
    font-family: var(--font-display);
    font-size: clamp(5rem, 20vw, 9rem);
    line-height: 1;
    color: var(--accent);
    transition: transform 0.2s;
  }

  .result-display .team-number.pop {
    animation: pop 0.35s ease;
  }

  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0.3; }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1);   opacity: 1; }
  }

  .btn-draw {
    width: 100%;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 2rem;
    letter-spacing: 3px;
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }

  .btn-draw:hover { background: var(--accent); color: #1a1400; }
  .btn-draw:active { transform: scale(0.97); }
  .btn-draw:disabled {
    border-color: var(--border);
    color: var(--muted);
    cursor: default;
    background: transparent;
  }

  .tally {
    width: 100%;
  }

  .tally-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .tally-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 8px;
  }

  .tally-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
    transition: background 0.2s, border-color 0.2s;
  }

  .tally-chip .chip-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }

  .tally-chip .chip-count {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--text);
  }

  .tally-chip.has-members {
    border-color: rgba(240, 192, 64, 0.3);
    background: rgba(240, 192, 64, 0.06);
  }

  .tally-chip.has-members .chip-count { color: var(--accent); }

  .btn-reset {
    font-size: 13px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 4px;
  }

  .btn-reset:hover { color: var(--text); }

  .done-banner {
    background: rgba(240,192,64,0.12);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 10px;
    padding: 14px 20px;
    text-align: center;
    width: 100%;
    display: none;
  }

  .done-banner.visible { display: block; }

  .done-banner strong {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .done-banner p { font-size: 13px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Quiz Night</p>
  <h1>Team <span>Draw</span></h1>
</header>

<div class="setup-card" id="setup">
  <div class="field-row">
    <div class="field">
      <label>Guests</label>
      <input type="number" id="num-guests" value="30" min="2" max="500">
    </div>
    <div class="field">
      <label>Teams</label>
      <input type="number" id="num-teams" value="6" min="2" max="100">
    </div>
  </div>
  <button class="btn-start" onclick="startDraw()">Let's Go →</button>
</div>

<div class="game-area" id="game">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div class="progress-label" id="progress-label">0 of 0 assigned</div>

  <div class="result-display" id="result-display">
    <span class="waiting">Press the button to assign the first person →</span>
  </div>

  <div class="done-banner" id="done-banner">
    <strong>All Done!</strong>
    <p>Everyone has been assigned to a team.</p>
  </div>

  <button class="btn-draw" id="btn-draw" onclick="drawNext()">Draw Team</button>

  <div class="tally">
    <p class="tally-title">Team counts</p>
    <div class="tally-grid" id="tally-grid"></div>
  </div>

  <button class="btn-reset" onclick="resetAll()">↩ Start over</button>
</div>

<script>
  let queue = [];
  let tally = [];
  let assigned = 0;
  let total = 0;
  let numTeams = 0;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildQueue(guests, teams) {
    const arr = [];
    for (let i = 0; i < guests; i++) {
      arr.push((i % teams) + 1);
    }
    return shuffle(arr);
  }

  function startDraw() {
    const g = parseInt(document.getElementById('num-guests').value);
    const t = parseInt(document.getElementById('num-teams').value);
    if (isNaN(g) || isNaN(t) || g < 2 || t < 2 || t > g) {
      alert('Please check your numbers — guests must be ≥ teams, both at least 2.');
      return;
    }

    total = g;
    numTeams = t;
    assigned = 0;
    tally = new Array(t).fill(0);
    queue = buildQueue(g, t);

    document.getElementById('setup').style.display = 'none';
    const game = document.getElementById('game');
    game.classList.add('visible');

    updateProgress();
    buildTally();

    const rd = document.getElementById('result-display');
    rd.innerHTML = '<span class="waiting">Press the button to assign the first person</span>';
    document.getElementById('btn-draw').disabled = false;
    document.getElementById('done-banner').classList.remove('visible');
  }

  function drawNext() {
    if (queue.length === 0) return;

    const team = queue.pop();
    assigned++;
    tally[team - 1]++;

    updateProgress();
    updateResult(team);
    updateTally();

    if (queue.length === 0) {
      document.getElementById('btn-draw').disabled = true;
      document.getElementById('done-banner').classList.add('visible');
    }
  }

  function updateProgress() {
    const pct = total > 0 ? (assigned / total) * 100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = assigned + ' of ' + total + ' assigned';
  }

  function updateResult(team) {
    const rd = document.getElementById('result-display');
    rd.innerHTML =
      '<p class="person-num">Person ' + assigned + '</p>' +
      '<p class="team-label">Team</p>' +
      '<div class="team-number" id="team-num">' + team + '</div>';
    requestAnimationFrame(() => {
      const el = document.getElementById('team-num');
      if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
    });
  }

  function buildTally() {
    const grid = document.getElementById('tally-grid');
    grid.innerHTML = '';
    for (let i = 0; i < numTeams; i++) {
      const chip = document.createElement('div');
      chip.className = 'tally-chip';
      chip.id = 'chip-' + i;
      chip.innerHTML = '<span class="chip-label">T' + (i + 1) + '</span><span class="chip-count">0</span>';
      grid.appendChild(chip);
    }
  }

  function updateTally() {
    for (let i = 0; i < numTeams; i++) {
      const chip = document.getElementById('chip-' + i);
      chip.querySelector('.chip-count').textContent = tally[i];
      chip.classList.toggle('has-members', tally[i] > 0);
    }
  }

  function resetAll() {
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').classList.remove('visible');
  }
</script>
</body>
</html>
